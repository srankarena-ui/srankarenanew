<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; padding: 28px; background: var(--bg); font-family: var(--font-sans); display: flex; flex-direction: column; gap: 22px; }
  .lbl { font-family: var(--font-mono); font-size: 9px; letter-spacing: var(--tracking-label); text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel" data-presets="react">
const { Tabs } = window.SRankArenaDesignSystem_6d53b2;
function Demo() {
  const [a, setA] = React.useState("overview");
  const [b, setB] = React.useState("active");
  return (
    <div>
      <div>
        <div className="lbl">Tournament detail</div>
        <Tabs value={a} onChange={setA} tabs={[
          { id: "overview", label: "Overview" },
          { id: "players", label: "Players", count: 32 },
          { id: "bracket", label: "Bracket" },
        ]} />
      </div>
      <div>
        <div className="lbl" style={{marginTop: 18}}>Full-width filter</div>
        <Tabs block value={b} onChange={setB} tabs={[
          { id: "all", label: "All" },
          { id: "active", label: "Live" },
          { id: "upcoming", label: "Upcoming" },
          { id: "done", label: "Ended" },
        ]} />
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
