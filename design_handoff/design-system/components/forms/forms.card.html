<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; padding: 26px; background: var(--bg); font-family: var(--font-sans); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px 22px; max-width: 620px; }
  .lbl { grid-column: 1 / -1; font-family: var(--font-mono); font-size: 9px; letter-spacing: var(--tracking-label); text-transform: uppercase; color: var(--text-muted); }
  .toggles { grid-column: 1 / -1; display: flex; flex-direction: column; gap: 14px; margin-top: 4px; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel" data-presets="react">
const { Input, Switch } = window.SRankArenaDesignSystem_6d53b2;
const search = <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>;

function Demo() {
  const [open, setOpen] = React.useState(true);
  const [verify, setVerify] = React.useState(false);
  return (
    <div className="grid">
      <span className="lbl">Inputs</span>
      <Input label="Email" type="email" placeholder="you@arena.gg" />
      <Input label="Search" leftIcon={search} placeholder="Find a tournament" />
      <Input label="Username" defaultValue="nova" hint="3–16 characters" />
      <Input label="Riot ID" error="That account is already linked" defaultValue="Nova#EUW" />
      <span className="lbl">Switches</span>
      <div className="toggles">
        <Switch checked={open} onChange={e => setOpen(e.target.checked)} label="Registration open" />
        <Switch checked={verify} onChange={e => setVerify(e.target.checked)} label="Require Riot verification" />
        <Switch checked={false} disabled label="Disabled option" />
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
