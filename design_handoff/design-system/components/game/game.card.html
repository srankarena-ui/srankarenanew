<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; padding: 26px; background: var(--bg); font-family: var(--font-sans); display: flex; flex-direction: column; gap: 22px; }
  .lbl { font-family: var(--font-mono); font-size: 9px; letter-spacing: var(--tracking-label); text-transform: uppercase; color: var(--text-muted); margin-bottom: 10px; }
  .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .statgrid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel" data-presets="react">
const { RankBadge, ProgressBar, StatTile } = window.SRankArenaDesignSystem_6d53b2;
const trophy = <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M6 9a6 6 0 0 0 12 0V4H6z"/><path d="M6 5H3v2a3 3 0 0 0 3 3M18 5h3v2a3 3 0 0 1-3 3M9 21h6M12 17v4"/></svg>;
function Demo() {
  return (
    <div>
      <div>
        <div className="lbl">Rank ladder · sizes &amp; glow</div>
        <div className="row">
          <RankBadge rank="F" size="sm" /><RankBadge rank="C" /><RankBadge rank="A" />
          <RankBadge rank="S" size="lg" glow />
        </div>
      </div>
      <div style={{marginTop: 20, maxWidth: 420}}>
        <div className="lbl">XP progress</div>
        <ProgressBar value={2480} max={5000} label="To rank S" valueText="2,480 / 5,000 XP" />
      </div>
      <div style={{marginTop: 22}}>
        <div className="lbl">Stat tiles</div>
        <div className="statgrid">
          <StatTile label="Wins" value="14" icon={trophy} delta="3" />
          <StatTile label="Avg KDA" value="4.8" />
          <StatTile label="Pentas" value="7" />
          <StatTile label="W/L" value="68%" delta="5%" deltaDir="down" />
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>

</html>
